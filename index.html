<!DOCTYPE html>
<html>
  <head>
    <title>Profile Card</title>
    <style>
      body {
        background-color: #e0f7fa;
        font-family: 'Segoe UI', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .card {
        background-color: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        width: 300px;
        text-align: center;
      }

      img {
        border-radius: 50%;
        width: 100px;
        margin-bottom: 10px;
      }

      h1 {
        color: #00695c;
      }

      p {
        color: #555;
        font-size: 16px;
      }

      a {
        display: inline-block;
        margin-top: 10px;
        color: #0097a7;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="https://via.placeholder.com/100" alt="Photo">
      <h1>Your Name</h1>
      <p>Learning to build beautiful websites!</p>
      <a href="#">View Portfolio</a>
    </div>
  </body>
</html>
